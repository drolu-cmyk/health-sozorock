name: Deploy Health Domain CloudFront

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Choose validate, deploy, or smoke-test.
        required: true
        type: choice
        options:
          - validate
          - deploy
          - smoke-test
        default: validate
      DEPLOY_HEALTH_SUBDOMAIN_ONLY:
        description: Type health.sozorockfoundation.org to confirm this workflow only manages the health subdomain.
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  health-domain-cloudfront:
    name: Health subdomain CloudFront automation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: health-domain-production

    env:
      AWS_REGION: us-east-1
      STACK_NAME: sozorock-health-cloudfront-domain
      DOMAIN_NAME: health.sozorockfoundation.org
      ORIGIN_DOMAIN_NAME: main.d1bmgq1fk26xqh.amplifyapp.com
      TEMPLATE_FILE: infra/cloudfront-health-domain/template.yaml

    steps:
      - name: Confirm health subdomain only
        run: |
          if [ "${{ inputs.DEPLOY_HEALTH_SUBDOMAIN_ONLY }}" != "health.sozorockfoundation.org" ]; then
            echo "Confirmation must exactly match health.sozorockfoundation.org"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required environment variables
        run: |
          if [ -z "${{ vars.AWS_ROLE_ARN }}" ]; then
            echo "Missing GitHub environment variable: AWS_ROLE_ARN"
            exit 1
          fi
          if [ -z "${{ vars.ROUTE53_HOSTED_ZONE_ID }}" ]; then
            echo "Missing GitHub environment variable: ROUTE53_HOSTED_ZONE_ID"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body "file://${TEMPLATE_FILE}" \
            --region "${AWS_REGION}"

      - name: Deploy CloudFormation stack
        if: ${{ inputs.operation == 'deploy' }}
        run: |
          aws cloudformation deploy \
            --stack-name "${STACK_NAME}" \
            --template-file "${TEMPLATE_FILE}" \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DomainName="${DOMAIN_NAME}" \
              OriginDomainName="${ORIGIN_DOMAIN_NAME}" \
              HostedZoneId="${{ vars.ROUTE53_HOSTED_ZONE_ID }}"

      - name: Print stack outputs
        if: ${{ inputs.operation == 'deploy' || inputs.operation == 'validate' }}
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs" \
            --output table || echo "Stack outputs are not available yet."

      - name: Setup Node
        if: ${{ inputs.operation == 'deploy' || inputs.operation == 'smoke-test' }}
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run health domain smoke test
        if: ${{ inputs.operation == 'deploy' || inputs.operation == 'smoke-test' }}
        run: node scripts/smoke-test-health-domain.mjs
